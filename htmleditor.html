<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Editor</title>
<link href="https://rsms.me/inter/inter.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<style>
*{font-family:'Inter',sans-serif;box-sizing:border-box}
body{margin:0;background:#0d1117;color:#e6edf3;display:flex;flex-direction:column;height:100vh}
header{background:#161b22;padding:12px;display:flex;justify-content:space-between;align-items:center;font-weight:600}
.controls{display:flex;gap:10px}
button{background:#21262d;border:1px solid #30363d;color:#e6edf3;padding:8px 12px;cursor:pointer;border-radius:6px}
button:hover{background:#30363d}
#container{display:flex;flex:1}
.editor{width:33.33%;display:flex;flex-direction:column;border-right:1px solid #222}
.editor:last-child{border-right:none}
.label{background:#161b22;padding:6px;text-align:center;font-size:13px;border-bottom:1px solid #222}
textarea{flex:1;background:#0d1117;color:#e6edf3;border:none;resize:none;padding:10px;font-family:monospace;outline:none}
#preview{height:40%;border:none;background:white}
</style>
</head>
<body>
<header>
<div><i class="fa-solid fa-code"></i> Web Editor</div>
<div class="controls">
<button onclick="runCode()"><i class="fa-solid fa-play"></i> Run</button>
<button onclick="clearCode()"><i class="fa-solid fa-trash"></i></button>
</div>
</header>
<div id="container">
<div class="editor">
<div class="label"><i class="fa-brands fa-html5"></i> HTML</div>
<textarea id="html"><h1>Hello World</h1></textarea>
</div>
<div class="editor">
<div class="label"><i class="fa-brands fa-css3-alt"></i> CSS</div>
<textarea id="css">body{display:flex;justify-content:center;align-items:center;height:100vh}</textarea>
</div>
<div class="editor">
<div class="label"><i class="fa-brands fa-js"></i> JavaScript</div>
<textarea id="js">console.log("hi")</textarea>
</div>
</div>
<iframe id="preview"></iframe>
<script>
function runCode(){
const html=document.getElementById("html").value
const css=document.getElementById("css").value
const js=document.getElementById("js").value
const output=`<!DOCTYPE html><html><head><style>${css}</style></head><body>${html}<script>try{${js}}catch(e){document.body.innerHTML+="<pre style='color:red'>"+e+"</pre>"}<\/script></body></html>`
document.getElementById("preview").srcdoc=output
}
function clearCode(){
document.getElementById("html").value=""
document.getElementById("css").value=""
document.getElementById("js").value=""
}
</script>
</body>
</html>
